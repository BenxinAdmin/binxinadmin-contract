# =========================================================
# BinxinAdmin · Redis 7.4 自定义配置
# 挂载到容器 /usr/local/etc/redis/redis.conf
# 密码通过 docker compose command 的 --requirepass 注入（避免硬编码）
# =========================================================

# ---- 网络 ----
bind 0.0.0.0
port 6379
protected-mode yes
tcp-backlog 511
tcp-keepalive 300
timeout 0

# ---- 通用 ----
daemonize no
loglevel notice
databases 16

# ---- 持久化：RDB ----
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ---- 持久化：AOF（更可靠，开发环境也开启） ----
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ---- 内存策略 ----
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# ---- 客户端 ----
maxclients 10000

# ---- 慢日志 ----
slowlog-log-slower-than 10000
slowlog-max-len 128

# ---- 延迟监控 ----
latency-monitor-threshold 0

# ---- 通知（按需开启，例如键过期事件用于业务） ----
notify-keyspace-events ""
