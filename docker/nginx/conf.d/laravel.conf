# =========================================================
# BinxinAdmin · Laravel 13 站点
# 容器内端口 81，宿主机映射 ${LARAVEL_PORT} 默认 8081
# =========================================================

server {
    listen       81 default_server;
    server_name  localhost binxin-laravel.local;
    root         /var/www/laravel/public;
    index        index.php index.html;

    charset utf-8;

    # ---- 安全头 ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ---- 禁止访问敏感目录与文件 ----
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* /(\.env|\.git|composer\.(json|lock)|package\.json|package-lock\.json) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/(vendor|storage|bootstrap/cache|tests)/ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---- 静态资源缓存 ----
    location ~* \.(jpg|jpeg|gif|png|webp|svg|ico|css|js|woff2?|ttf|eot)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # ---- Laravel 路由：所有请求走 index.php ----
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ---- PHP-FPM 转发 ----
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass   php:9000;
        fastcgi_index  index.php;
        include        fastcgi_params;

        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  SCRIPT_NAME      $fastcgi_script_name;
        fastcgi_param  DOCUMENT_ROOT    $document_root;
        fastcgi_param  PATH_INFO        $fastcgi_path_info;
        fastcgi_param  HTTPS            $https if_not_empty;

        fastcgi_connect_timeout  60s;
        fastcgi_send_timeout     300s;
        fastcgi_read_timeout     300s;
        fastcgi_buffer_size      64k;
        fastcgi_buffers          16 64k;
        fastcgi_busy_buffers_size 128k;
    }
}
